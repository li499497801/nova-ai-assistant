<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nova — AI 助手</title>
<style>
:root{--bg:#0f0f0f;--sidebar:#1a1a1a;--card:#1e1e1e;--border:#2a2a2a;--text:#e0e0e0;--muted:#888;--accent:#7c5cfc;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--user-bg:#2d2d2d;--bot-bg:#1a1a2e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei","Segoe UI",sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
/* Sidebar */
.sidebar{width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:1.1rem;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.new-chat{width:100%;padding:10px;margin-top:10px;border:1px dashed var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-size:0.85rem;transition:all .2s}
.new-chat:hover{border-color:var(--accent);color:var(--text)}
.session-list{flex:1;overflow-y:auto;padding:8px}
.session-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;transition:background .15s;font-size:0.85rem}
.session-item:hover{background:var(--border)}
.session-item.active{background:var(--card);border:1px solid var(--border)}
.session-item .del{opacity:0;color:var(--muted);cursor:pointer;font-size:0.75rem;padding:2px 6px;border-radius:4px}
.session-item:hover .del{opacity:1}
.session-item .del:hover{color:var(--red);background:rgba(248,113,113,0.1)}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);font-size:0.75rem;color:var(--muted)}
/* Notifications */
.notif-btn{position:relative;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;padding:4px}
.notif-btn:hover{color:var(--text)}
.notif-badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;font-size:0.6rem;padding:1px 5px;border-radius:10px;display:none}
.notif-panel{position:fixed;top:50px;right:20px;width:360px;max-height:500px;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:100;display:none;flex-direction:column;overflow:hidden}
.notif-panel.show{display:flex}
.notif-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.notif-header h3{font-size:0.9rem}
.notif-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.75rem}
.notif-clear:hover{color:var(--red)}
.notif-list{flex:1;overflow-y:auto;padding:8px}
.notif-item{padding:10px 12px;border-radius:8px;margin-bottom:4px;background:var(--bg);border-left:3px solid var(--accent)}
.notif-item .notif-title{font-size:0.8rem;font-weight:600;color:var(--accent);margin-bottom:4px}
.notif-item .notif-content{font-size:0.8rem;color:var(--text);line-height:1.5;max-height:100px;overflow:hidden}
.notif-item .notif-time{font-size:0.7rem;color:var(--muted);margin-top:4px}
/* Main */
.main{flex:1;display:flex;flex-direction:column}
.topbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.topbar select{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:0.8rem;cursor:pointer}
.topbar .model-label{font-size:0.8rem;color:var(--muted)}
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:80%;padding:12px 16px;border-radius:12px;font-size:0.9rem;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.user{align-self:flex-end;background:var(--user-bg);border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:var(--bot-bg);border-bottom-left-radius:4px}
.msg .plugin-tag{font-size:0.7rem;color:var(--green);margin-top:6px;display:inline-block;padding:2px 8px;background:rgba(74,222,128,0.1);border-radius:4px}
.msg code{background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:3px;font-size:0.85em}
.msg pre{background:rgba(0,0,0,0.3);padding:10px;border-radius:6px;overflow-x:auto;margin:8px 0}
.msg pre code{background:transparent;padding:0}
.welcome{text-align:center;color:var(--muted);margin:auto;padding:40px}
.welcome h3{font-size:1.3rem;margin-bottom:8px;color:var(--text)}
.welcome p{font-size:0.85rem;margin-bottom:4px}
/* Input */
.input-area{padding:16px 20px;border-top:1px solid var(--border)}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-row textarea{flex:1;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:0.9rem;resize:none;outline:none;min-height:44px;max-height:150px;font-family:inherit;transition:border .2s}
.input-row textarea:focus{border-color:var(--accent)}
.input-row textarea::placeholder{color:var(--muted)}
.send-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 20px;cursor:pointer;font-size:0.9rem;transition:opacity .15s;flex-shrink:0}
.send-btn:hover{opacity:0.85}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}
.status{font-size:0.75rem;color:var(--muted);text-align:center;margin-top:6px;min-height:18px}
/* Responsive */
@media(max-width:768px){.sidebar{display:none}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h2>Nova AI</h2>
    <button class="new-chat" onclick="newSession()">+ 新对话</button>
  </div>
  <div class="session-list" id="sessionList"></div>
  <div class="sidebar-footer">
    <span id="pluginCount">0</span> 个插件已加载
  </div>
</div>

<div class="main">
  <div class="topbar">
    <span class="model-label">模型:</span>
    <select id="modelSelect" onchange="switchModel(this.value)"></select>
    <div style="flex:1"></div>
    <button class="notif-btn" onclick="toggleNotifications()">🔔<span class="notif-badge" id="notifBadge">0</span></button>
  </div>
  <div class="notif-panel" id="notifPanel">
    <div class="notif-header">
      <h3>通知</h3>
      <button class="notif-clear" onclick="clearNotifications()">清空</button>
    </div>
    <div class="notif-list" id="notifList"></div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="welcome">
      <h3>你好，我是 Nova</h3>
      <p>你的 AI 私人助手</p>
      <p style="margin-top:12px;font-size:0.8rem">输入消息开始对话 · 说"记住 xxx"让我记东西</p>
      <p style="font-size:0.8rem">说"定时"创建自动任务 · 🔔 查看通知</p>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="输入消息..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">发送</button>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
let currentSession = null;
let sessions = [];
let isSending = false;

// ── 初始化 ──
async function init() {
  await loadModels();
  await loadSessions();
  await loadPlugins();
  if (sessions.length > 0) {
    selectSession(sessions[0].id);
  }
}

// ── 模型 ──
async function loadModels() {
  const resp = await fetch('/api/models');
  const data = await resp.json();
  const sel = document.getElementById('modelSelect');
  sel.innerHTML = data.models.map(m =>
    `<option value="${m.id}" ${m.id === data.default ? 'selected' : ''}>${m.name}</option>`
  ).join('');
}

async function switchModel(model) {
  await fetch('/api/models/switch', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({model})
  });
  setStatus(`已切换到 ${model}`);
}

// ── 会话 ──
async function loadSessions() {
  const resp = await fetch('/api/sessions');
  sessions = await resp.json();
  renderSessions();
}

function renderSessions() {
  const list = document.getElementById('sessionList');
  list.innerHTML = sessions.map(s =>
    `<div class="session-item ${s.id === currentSession ? 'active' : ''}" onclick="selectSession('${s.id}')">
      <span>${s.name}</span>
      <span class="del" onclick="event.stopPropagation();deleteSession('${s.id}')">删除</span>
    </div>`
  ).join('');
}

async function newSession() {
  const resp = await fetch('/api/sessions', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({})
  });
  const session = await resp.json();
  sessions.unshift(session);
  selectSession(session.id);
}

async function selectSession(sid) {
  currentSession = sid;
  renderSessions();
  await loadMessages(sid);
}

async function deleteSession(sid) {
  await fetch(`/api/sessions/${sid}`, {method: 'DELETE'});
  sessions = sessions.filter(s => s.id !== sid);
  if (currentSession === sid) {
    currentSession = sessions.length > 0 ? sessions[0].id : null;
    if (currentSession) await loadMessages(currentSession);
    else clearChat();
  }
  renderSessions();
}

// ── 消息 ──
async function loadMessages(sid) {
  const resp = await fetch(`/api/sessions/${sid}/messages`);
  const msgs = await resp.json();
  renderMessages(msgs);
}

function renderMessages(msgs) {
  const area = document.getElementById('chatArea');
  if (msgs.length === 0) {
    area.innerHTML = `<div class="welcome"><h3>新对话</h3><p>输入消息开始</p></div>`;
    return;
  }
  area.innerHTML = msgs.map(m => {
    let content = escapeHtml(m.content);
    content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
    content = content.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    const plugin = m.plugin_used ? `<div class="plugin-tag">🔌 ${m.plugin_used}</div>` : '';
    return `<div class="msg ${m.role}">${content}${plugin}</div>`;
  }).join('');
  scrollBottom();
}

function clearChat() {
  document.getElementById('chatArea').innerHTML =
    '<div class="welcome"><h3>你好，我是 Nova</h3><p>你的 AI 私人助手</p></div>';
}

// ── 发送 ──
async function send() {
  if (isSending) return;
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;
  if (!currentSession) await newSession();

  isSending = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  setStatus('思考中...');

  // 立即显示用户消息
  appendMessage('user', msg);
  scrollBottom();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({session_id: currentSession, message: msg})
    });
    const data = await resp.json();
    if (data.error) {
      appendMessage('assistant', `错误: ${data.error}`);
    } else {
      appendMessage('assistant', data.reply, data.plugin_used);
    }
  } catch(e) {
    appendMessage('assistant', `请求失败: ${e}`);
  }

  isSending = false;
  document.getElementById('sendBtn').disabled = false;
  setStatus('');
  scrollBottom();
  // 刷新会话列表（更新时间）
  loadSessions();
}

function appendMessage(role, content, plugin) {
  const area = document.getElementById('chatArea');
  const welcome = area.querySelector('.welcome');
  if (welcome) welcome.remove();

  let html = escapeHtml(content);
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  const pluginTag = plugin ? `<div class="plugin-tag">🔌 ${plugin}</div>` : '';

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = html + pluginTag;
  area.appendChild(div);
  scrollBottom();
}

// ── 插件 ──
async function loadPlugins() {
  const resp = await fetch('/api/plugins');
  const plugins = await resp.json();
  document.getElementById('pluginCount').textContent = plugins.length;
}

// ── 工具 ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
  // 自动调整高度
  const ta = e.target;
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 150) + 'px';
}

function scrollBottom() {
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

function setStatus(text) {
  document.getElementById('status').textContent = text;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ── 通知 ──
let notifPollTimer = null;

function toggleNotifications() {
  const panel = document.getElementById('notifPanel');
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) {
    loadNotifications();
  }
}

async function loadNotifications() {
  const resp = await fetch('/api/notifications');
  const notifs = await resp.json();
  renderNotifications(notifs);
  updateNotifBadge(notifs);
}

function renderNotifications(notifs) {
  const list = document.getElementById('notifList');
  if (notifs.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px">暂无通知</div>';
    return;
  }
  list.innerHTML = notifs.reverse().map(n => {
    let content = escapeHtml(n.content);
    content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
    const time = n.time ? n.time.substring(11, 16) : '';
    return `<div class="notif-item" style="${n.read ? 'opacity:0.6' : ''}">
      <div class="notif-title">${escapeHtml(n.title)}</div>
      <div class="notif-content">${content}</div>
      <div class="notif-time">${time}</div>
    </div>`;
  }).join('');
}

function updateNotifBadge(notifs) {
  const unread = notifs.filter(n => !n.read).length;
  const badge = document.getElementById('notifBadge');
  badge.textContent = unread;
  badge.style.display = unread > 0 ? 'block' : 'none';
}

async function clearNotifications() {
  await fetch('/api/notifications/clear', {method: 'POST'});
  loadNotifications();
}

function startNotifPolling() {
  if (notifPollTimer) clearInterval(notifPollTimer);
  notifPollTimer = setInterval(async () => {
    const resp = await fetch('/api/notifications');
    const notifs = await resp.json();
    updateNotifBadge(notifs);
  }, 15000);
}

init();
startNotifPolling();
</script>
</body>
</html>
